name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -v

  release:
    name: Build ZIP and publish release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version in manifest.json
        run: |
          VERSION="${{ github.ref_name }}"
          jq --arg v "$VERSION" '.version = $v' custom_components/awtrix/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/awtrix/manifest.json

      - name: Build ha-awtrix-${{ github.ref_name }}.zip
        run: |
          cd custom_components
          zip -r ../ha-awtrix-${{ github.ref_name }}.zip awtrix/ \
            -x "awtrix/__pycache__/*" \
            -x "awtrix/*/__pycache__/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ha-awtrix-${{ github.ref_name }}.zip
          generate_release_notes: true
